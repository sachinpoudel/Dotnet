services: 
  postgres: 
    image: postgres:17-alpine
    environment: 
      POSTGRES_USER: postgres2
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    ports: 
      - "5632:5432"
    restart: always
    volumes: 
      - postgres_data:/var/lib/postgresql/data
    healthcheck: 
        test: ["CMD-SHELL", "pg_isready -U postgres -d mydb"]
        interval: 10s
        timeout: 5s
volumes: 
  postgres_data:        