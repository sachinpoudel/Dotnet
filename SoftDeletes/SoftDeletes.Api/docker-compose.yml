services: 
  postgres: 
    image: postgres:17-alpine
    container_name: postgres1
    restart: always
    environment: 
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: softdeletesdb
    ports:
      - "5433:5432"
    volumes: 
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d softdeletesdb"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:  